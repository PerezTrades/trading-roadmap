
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f12; --surface:#13161b; --surface2:#1a1e26; --surface3:#20242e;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8eaf0; --muted:#6b7280; --dim:#3d4452;
  --green:#22c97a; --green-dim:rgba(34,201,122,0.1); --green-glow:rgba(34,201,122,0.2);
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.1);
  --blue:#4f8ef7; --blue-dim:rgba(79,142,247,0.1);
  --coral:#ff6b6b; --coral-dim:rgba(255,107,107,0.1);
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.1);
  --teal:#2dd4bf; --teal-dim:rgba(45,212,191,0.1);
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{padding:24px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.header-eyebrow{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;}
.header-title{font-size:21px;font-weight:600;letter-spacing:-.02em;}
.header-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.header-stats{display:flex;gap:20px;}
.stat{text-align:right;}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1;}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;}

/* OVERALL BAR */
.overall-bar{padding:14px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.bar-label{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;min-width:120px;}
.bar-track{flex:1;height:3px;background:var(--dim);border-radius:2px;overflow:hidden;}
.bar-fill{height:3px;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.bar-pct{font-family:var(--mono);font-size:11px;min-width:34px;text-align:right;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:252px 1fr;min-height:calc(100vh - 108px);}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);padding:16px 0;position:sticky;top:0;height:calc(100vh - 108px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.sidebar-label{font-size:9px;font-family:var(--mono);color:var(--dim);letter-spacing:.14em;text-transform:uppercase;padding:10px 16px 5px;}
.sidebar-divider{height:1px;background:var(--border);margin:8px 12px;}

.phase-btn{width:100%;background:none;border:none;cursor:pointer;padding:9px 12px;border-radius:8px;display:flex;align-items:center;gap:10px;text-align:left;transition:background .12s;margin-bottom:1px;}
.phase-btn:hover{background:var(--surface2);}
.phase-btn.active{background:var(--surface2);}
.phase-ring{width:34px;height:34px;flex-shrink:0;position:relative;}
.phase-ring svg{width:34px;height:34px;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--dim);stroke-width:2.5;}
.ring-fill{fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;}
.phase-info{flex:1;min-width:0;}
.phase-info-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.phase-info-meta{font-size:10px;color:var(--muted);margin-top:1px;font-family:var(--mono);}

.day-nav{padding:0 12px;}
.day-btn{width:100%;background:none;border:none;cursor:pointer;padding:7px 8px;border-radius:6px;display:flex;align-items:center;gap:8px;text-align:left;transition:background .12s;margin-bottom:1px;}
.day-btn:hover{background:var(--surface2);}
.day-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--dim);transition:all .2s;}
.day-dot.done{background:var(--green);border-color:var(--green);box-shadow:0 0 6px var(--green-glow);}
.day-dot.active{border-color:var(--amber);box-shadow:0 0 6px rgba(245,166,35,.4);}
.day-btn-label{font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-count{font-family:var(--mono);font-size:9px;color:var(--dim);}

/* MAIN */
.main{padding:26px 30px;overflow-y:auto;max-height:calc(100vh - 108px);scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}

.phase-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.phase-header-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:15px;font-weight:700;flex-shrink:0;}
.phase-header-name{font-size:19px;font-weight:600;letter-spacing:-.02em;margin-bottom:5px;}
.phase-header-meta{display:flex;gap:14px;flex-wrap:wrap;}
.meta-chip{font-family:var(--mono);font-size:10px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;}
.meta-chip::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;}

.day-section{margin-bottom:18px;}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none;padding:3px 0;}
.day-header-num{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;min-width:36px;}
.day-header-title{font-size:13px;font-weight:500;flex:1;}
.day-mini-bar{flex-shrink:0;width:48px;height:2px;background:var(--dim);border-radius:1px;overflow:hidden;}
.day-mini-fill{height:2px;border-radius:1px;background:var(--green);transition:width .4s;}
.day-header-progress{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:28px;text-align:right;}
.day-header-chevron{color:var(--dim);font-size:9px;transition:transform .2s;}
.day-header.collapsed .day-header-chevron{transform:rotate(-90deg);}

.task-list{display:flex;flex-direction:column;gap:1px;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.task-list.collapsed{max-height:0!important;}

.task-section-head{font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.14em;padding:10px 10px 3px;}

.task-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .1s;}
.task-item:hover{background:var(--surface2);}
.task-item.done{opacity:.5;}
.task-item.done:hover{opacity:.7;}
.task-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--dim);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-item.done .task-check{background:var(--green);border-color:var(--green);}
.task-check-inner{width:5px;height:8px;border:1.5px solid #0d0f12;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);opacity:0;transition:opacity .15s;}
.task-item.done .task-check-inner{opacity:1;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:12px;font-weight:500;margin-bottom:2px;line-height:1.4;}
.task-item.done .task-title{text-decoration:line-through;color:var(--muted);}
.task-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.task-item.done .task-desc{color:var(--dim);}
.task-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.task-tag{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:99px;letter-spacing:.04em;}
.tag-free{background:var(--green-dim);color:var(--green);}
.tag-time{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
.tag-key{background:var(--blue-dim);color:var(--blue);}
.tag-concept{background:var(--purple-dim);color:var(--purple);}
.tag-live{background:var(--amber-dim);color:var(--amber);}

/* STRATEGY CARDS */
.strategy-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.strategy-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.strategy-card.active{border-color:var(--green);background:var(--green-dim);}
.strategy-card-label{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;}
.strategy-card.active .strategy-card-label{color:var(--green);}
.strategy-card-name{font-size:13px;font-weight:500;margin-bottom:8px;}
.strategy-stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--border);font-size:11px;}
.strategy-stat-row:last-child{border-bottom:none;}
.strategy-stat-label{color:var(--muted);}
.strategy-stat-val{font-family:var(--mono);font-weight:500;}

/* RISK RULES */
.risk-rules{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.risk-rule{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.risk-rule:last-child{border-bottom:none;}
.risk-rule-num{min-width:24px;height:24px;border-radius:50%;background:var(--coral-dim);color:var(--coral);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;margin-top:1px;}

/* CONCEPTS */
.concepts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;}
.concept-card.learned{border-color:var(--green);background:var(--green-dim);}
.concept-card-name{font-size:12px;font-weight:500;margin-bottom:3px;}
.concept-card.learned .concept-card-name{color:var(--green);}
.concept-card-desc{font-size:10px;color:var(--muted);line-height:1.5;}
.concept-badge{display:inline-block;font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:99px;margin-top:6px;}

/* LOCKED */
.locked-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:10px;}
.locked-icon{font-size:28px;opacity:.25;}
.locked-text{font-size:13px;color:var(--muted);}
.locked-sub{font-size:11px;color:var(--dim);}

/* PAPER TRADING PANEL */
.paper-panel{background:var(--surface);border:1px solid var(--amber);border-radius:10px;padding:16px;margin-bottom:18px;}
.paper-panel-label{font-size:9px;font-family:var(--mono);color:var(--amber);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;}
.paper-panel-title{font-size:14px;font-weight:500;margin-bottom:4px;}
.paper-panel-sub{font-size:11px;color:var(--muted);line-height:1.6;}
.paper-metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:11px;}
.paper-metric:last-child{border-bottom:none;}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.main>*{animation:fadeIn .2s ease both;}

@media(max-width:640px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.header{padding:18px;}.main{padding:18px;max-height:none;}.overall-bar{padding:10px 18px;}}
</style>
</head>

<div class="header">

    <div class="header-eyebrow">// systematic trading roadmap</div>
    <div class="header-title">Path to Passive Automation</div>

  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-val" id="total-done" style="color:var(--green)">0</div><div class="stat-label">tasks done</div></div>
    <div class="stat"><div class="stat-val" id="days-done" style="color:var(--amber)">0</div><div class="stat-label">days complete</div></div>
    <div class="stat"><div class="stat-val" id="concepts-done" style="color:var(--purple)">0</div><div class="stat-label">concepts learned</div></div>
  </div>
</div>

<div class="overall-bar">
  <div class="bar-label">Overall progress</div>
  <div class="bar-track"><div class="bar-fill" id="overall-fill" style="width:0%;background:var(--green);box-shadow:0 0 8px var(--green-glow);"></div></div>
  <div class="bar-pct" id="overall-pct" style="color:var(--green)">0%</div>
</div>

<div class="layout">

    <div class="sidebar-label">Phases</div>
    <div id="phase-nav" style="padding:0 8px;"></div>

    <div class="sidebar-label">Days — current phase</div>
    <div class="day-nav" id="day-nav"></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

const CONCEPTS=[
  {id:'c1',name:'Sharpe ratio',desc:'Return per unit of risk',taskId:'t7'},
  {id:'c2',name:'Max drawdown',desc:'Worst peak-to-trough drop',taskId:'t8'},
  {id:'c3',name:'Profit factor',desc:'Total wins ÷ total losses',taskId:'t16'},
  {id:'c4',name:'Momentum',desc:'Winners keep winning, for a while',taskId:'t10'},
  {id:'c5',name:'Mean reversion',desc:'Extremes correct to average',taskId:'t11'},
  {id:'c6',name:'RSI',desc:'Relative Strength Index signal',taskId:'t21'},
  {id:'c7',name:'Moving average',desc:'Smoothed price over N days',taskId:'t13'},
  {id:'c8',name:'Backtesting',desc:'Testing strategy on historical data',taskId:'t25'},
  {id:'c9',name:'Position sizing',desc:'How much to risk per trade',taskId:'t31'},
  {id:'c10',name:'Risk/reward ratio',desc:'Potential gain vs potential loss',taskId:'t32'},
];

const STRATEGIES=[
  {id:'s1',name:'Momentum Rotation v1',status:'watching',color:'#22c97a',stats:[
    {label:'Universe',val:'SPY/QQQ/IWM/GLD'},
    {label:'Filter',val:'200-day MA → BIL'},
    {label:'Rebalance',val:'Monthly'},
    {label:'Backtest Sharpe',val:'0.65'},
    {label:'Backtest DD',val:'−27.8%'},
    {label:'Backtest annual',val:'8.3%'},
    {label:'Watching since',val:'Apr 1, 2026'},
  ]},
  {id:'s2',name:'Mean Reversion RSI v1',status:'watching',color:'#a78bfa',stats:[
    {label:'Universe',val:'SPY only'},
    {label:'Signal',val:'RSI(10) < 40 buy, > 60 sell'},
    {label:'Filter',val:'200-day MA → BIL'},
    {label:'Rebalance',val:'Daily'},
    {label:'Backtest Sharpe',val:'0.59'},
    {label:'Backtest DD',val:'−19.9%'},
    {label:'Watching since',val:'Apr 1, 2026'},
  ]},
];

const RISK_RULES=[
  {num:'1',text:'Max risk per trade: $5 (1% of $500). Never override this regardless of confidence.'},
  {num:'2',text:'Stop strategy if account drops to $400 (−$100, 20% drawdown). Diagnose before resuming.'},
  {num:'3',text:'Scale up only with $2,000+ capital, after Phase 5 proves profitable for 3+ months.'},
];

// Pre-completed tasks
const PRE_DONE=['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15','t16','t17','t18','t19','t20','t21','t22','t23','t24','t25','t26','t27','t28','t29','t30','t31','t32','t33','t34','t35','t36','t37','t38','t39','t40','t41','t42','t43','t44','t45','t46','t47','t48','t49','t50','t51','t52'];

let state={done:{},collapsed:{},activePhase:'p4'};

function load(){
  try{const s=localStorage.getItem(SK);if(s)state={...state,...JSON.parse(s)};}catch(e){}
  PRE_DONE.forEach(id=>{if(state.done[id]===undefined)state.done[id]=true;});
}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}

function allTasks(){let t=[];PHASES.forEach(p=>p.days.forEach(d=>d.sections.forEach(s=>t=t.concat(s.tasks))));return t;}
function dayProgress(day){let done=0,total=0;day.sections.forEach(s=>s.tasks.forEach(t=>{total++;if(state.done[t.id])done++;}));return{done,total};}
function phaseProgress(phase){let done=0,total=0;phase.days.forEach(d=>{const p=dayProgress(d);done+=p.done;total+=p.total;});return{done,total};}
function daysComplete(){let n=0;PHASES.forEach(p=>p.days.forEach(d=>{const{done,total}=dayProgress(d);if(done===total&&total>0)n++;}));return n;}
function conceptsDone(){return CONCEPTS.filter(c=>state.done[c.taskId]).length;}

function updateStats(){
  const total=allTasks().length;
  const done=Object.values(state.done).filter(Boolean).length;
  document.getElementById('total-done').textContent=done;
  document.getElementById('days-done').textContent=daysComplete();
  document.getElementById('concepts-done').textContent=conceptsDone();
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('overall-fill').style.width=pct+'%';
  document.getElementById('overall-pct').textContent=pct+'%';
}

function renderSidebar(){
  // Phase nav
  const nav=document.getElementById('phase-nav');
  nav.innerHTML='';
  PHASES.forEach(phase=>{
    const{done,total}=phaseProgress(phase);
    const pct=total>0?done/total:0;
    const C=2*Math.PI*13;
    const offset=C*(1-pct);
    const btn=document.createElement('button');
    btn.className='phase-btn'+(state.activePhase===phase.id?' active':'');
    btn.innerHTML=`
      <div class="phase-ring">
        <svg viewBox="0 0 34 34">
          <circle class="ring-bg" cx="17" cy="17" r="13"/>
          <circle class="ring-fill" cx="17" cy="17" r="13" stroke="${phase.color}"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
        </svg>
        <div class="ring-num" style="color:${phase.color}">${phase.id.replace('p','')}</div>
      </div>
      <div class="phase-info">
        <div class="phase-info-name">${phase.name}</div>
        <div class="phase-info-meta">${total>0?done+'/'+total:phase.months}</div>
      </div>`;
    btn.onclick=()=>{state.activePhase=phase.id;save();renderAll();};
    nav.appendChild(btn);
  });

  // Day nav
  const dayNav=document.getElementById('day-nav');
  dayNav.innerHTML='';
  const ap=PHASES.find(p=>p.id===state.activePhase);
  if(ap&&ap.days.length>0){
    ap.days.forEach((day,i)=>{
      const{done,total}=dayProgress(day);
      const complete=done===total&&total>0;
      const btn=document.createElement('button');
      btn.className='day-btn';
      btn.innerHTML=`
        <div class="day-dot${complete?' done':''}"></div>
        <div class="day-btn-label">Day ${i+1}: ${day.title}</div>
        <div class="day-count">${done}/${total}</div>`;
      btn.onclick=()=>document.getElementById('day-'+day.id)?.scrollIntoView({behavior:'smooth',block:'start'});
      dayNav.appendChild(btn);
    });
  }
}

function renderMain(){
  const main=document.getElementById('main-content');
  main.innerHTML='';
  const phase=PHASES.find(p=>p.id===state.activePhase);
  if(!phase)return;

  const{done,total}=phaseProgress(phase);
  const hdr=document.createElement('div');
  hdr.className='phase-header';
  hdr.innerHTML=`
    <div class="phase-header-icon" style="background:${phase.color}18;color:${phase.color};border:1px solid ${phase.color}30">
      P${phase.id.replace('p','')}
    </div>
    <div>
      <div class="phase-header-name" style="color:${phase.color}">${phase.name}</div>
      <div class="phase-header-meta">
        <span class="meta-chip" style="color:var(--muted)">${phase.months}</span>
        <span class="meta-chip" style="color:var(--muted)">${phase.cost}</span>
        ${total>0?`<span class="meta-chip" style="color:${phase.color}">${done}/${total} tasks</span>`:''}
        ${phase.id==='p4'?`<span class="meta-chip" style="color:var(--amber)">Active since Apr 1, 2026</span>`:''}
      </div>
    </div>`;
  main.appendChild(hdr);

  if(phase.locked){
    const lock=document.createElement('div');
    lock.className='locked-overlay';
    lock.innerHTML=`<div class="locked-icon">🔒</div><div class="locked-text">Complete Phase ${parseInt(phase.id.replace('p',''))-1} to unlock</div><div class="locked-sub">${phase.subtitle} · ${phase.months}</div>`;
    main.appendChild(lock);
    return;
  }

  // Paper trading panel for p4
  if(phase.id==='p4'){
    const panel=document.createElement('div');
    panel.className='paper-panel';
    panel.innerHTML=`
      <div class="paper-panel-label">📡 Live paper trading — both strategies watching</div>
      <div class="paper-panel-title">Phase 4 active since April 1, 2026</div>
      <div class="paper-panel-sub" style="margin-bottom:12px;">Day 1 numbers are noise — one day annualized. Check back May 1 for first meaningful read.</div>
      <div class="paper-metric"><span style="color:var(--muted)">Next check-in</span><span style="font-family:var(--mono);font-weight:500;color:var(--amber)">May 1, 2026 (30 days)</span></div>
      <div class="paper-metric"><span style="color:var(--muted)">Meaningful data</span><span style="font-family:var(--mono);font-weight:500">July 1, 2026 (90 days)</span></div>
      <div class="paper-metric"><span style="color:var(--muted)">Go/no-go gate</span><span style="font-family:var(--mono);font-weight:500">October 1, 2026 (6 months)</span></div>`;
    main.appendChild(panel);
  }

  // Days
  phase.days.forEach((day,di)=>{
    const{done,total}=dayProgress(day);
    const pct=total>0?Math.round(done/total*100):0;
    const collapsed=state.collapsed[day.id];
    const sec=document.createElement('div');
    sec.className='day-section';
    sec.id='day-'+day.id;

    const dh=document.createElement('div');
    dh.className='day-header'+(collapsed?' collapsed':'');
    dh.innerHTML=`
      <div class="day-header-num">Day ${di+1}</div>
      <div class="day-header-title">${day.title}</div>
      <div class="day-mini-bar"><div class="day-mini-fill" style="width:${pct}%"></div></div>
      <div class="day-header-progress">${done}/${total}</div>
      <div class="day-header-chevron">▾</div>`;
    dh.onclick=()=>{state.collapsed[day.id]=!state.collapsed[day.id];save();renderAll();};

    const tl=document.createElement('div');
    tl.className='task-list'+(collapsed?' collapsed':'');
    if(!collapsed)tl.style.maxHeight='9999px';

    day.sections.forEach(section=>{
      const sh=document.createElement('div');
      sh.className='task-section-head';
      sh.textContent=section.label;
      tl.appendChild(sh);
      section.tasks.forEach(task=>{
        const isDone=!!state.done[task.id];
        const item=document.createElement('div');
        item.className='task-item'+(isDone?' done':'');
        const tagHtml=(task.tags||[]).map(tag=>{
          const cls=tag==='free'?'tag-free':tag==='key habit'?'tag-key':tag==='concept'?'tag-concept':tag==='live'||tag==='done'?'tag-live':'tag-time';
          return`<span class="task-tag ${cls}">${tag}</span>`;
        }).join('');
        item.innerHTML=`
          <div class="task-check"><div class="task-check-inner"></div></div>
          <div class="task-body">
            <div class="task-title">${task.title}</div>
            <div class="task-desc">${task.desc}</div>
            <div class="task-tags">${tagHtml}</div>
          </div>`;
        item.onclick=()=>{state.done[task.id]=!state.done[task.id];save();renderAll();};
        tl.appendChild(item);
      });
    });

    sec.appendChild(dh);
    sec.appendChild(tl);
    main.appendChild(sec);
  });

  // Strategy cards for p4
  if(phase.id==='p4'){
    const grid=document.createElement('div');
    grid.className='strategy-grid';
    const gh=document.createElement('div');
    gh.style.cssText='grid-column:1/-1;font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.14em;';
    gh.textContent='Your strategies — live in paper trading';
    grid.appendChild(gh);
    STRATEGIES.forEach(s=>{
      const card=document.createElement('div');
      card.className='strategy-card active';
      card.style.borderColor=s.color;
      card.style.background=s.color+'15';
      const statsHtml=s.stats.map(st=>`<div class="strategy-stat-row"><span class="strategy-stat-label">${st.label}</span><span class="strategy-stat-val" style="color:${s.color}">${st.val}</span></div>`).join('');
      card.innerHTML=`
        <div class="strategy-card-label" style="color:${s.color}">● Watching</div>
        <div class="strategy-card-name">${s.name}</div>
        ${statsHtml}`;
      grid.appendChild(card);
    });
    main.appendChild(grid);
  }

  // Risk rules for p4/p5
  if(phase.id==='p4'||phase.id==='p5'){
    const rr=document.createElement('div');
    rr.className='risk-rules';
    const rrh=document.createElement('div');
    rrh.style.cssText='font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;';
    rrh.textContent='Your 3 personal risk rules — never override';
    rr.appendChild(rrh);
    RISK_RULES.forEach(r=>{
      const row=document.createElement('div');
      row.className='risk-rule';
      row.innerHTML=`<div class="risk-rule-num">${r.num}</div><div style="color:var(--text);line-height:1.5;">${r.text}</div>`;
      rr.appendChild(row);
    });
    main.appendChild(rr);
  }

  // Concepts for p1
  if(phase.id==='p1'){
    const grid=document.createElement('div');
    grid.className='concepts-grid';
    const gh=document.createElement('div');
    gh.style.cssText='grid-column:1/-1;font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.14em;';
    gh.textContent='Concepts tracker';
    grid.appendChild(gh);
    CONCEPTS.forEach(concept=>{
      const learned=!!state.done[concept.taskId];
      const card=document.createElement('div');
      card.className='concept-card'+(learned?' learned':'');
      card.innerHTML=`
        <div class="concept-card-name">${concept.name}</div>
        <div class="concept-card-desc">${concept.desc}</div>
        <div class="concept-badge ${learned?'tag-free':'tag-time'}">${learned?'✓ learned':'pending'}</div>`;
      grid.appendChild(card);
    });
    main.appendChild(grid);
  }
}

function renderAll(){renderSidebar();renderMain();updateStats();}
load();
renderAll();
</script>
